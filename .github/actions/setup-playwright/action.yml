name: Setup Playwright
description: Install Playwright version specified in package.json
inputs:
    skip-dependency-install:
        description: "Skip installing dependencies"
        required: false
        default: "false"

runs:
    using: composite
    steps:
        - name: Get installed Playwright version
          id: playwright
          shell: bash
          run: |
              version=$(jq -r '.dependencies.playwright' ./e2e/package.json)
              echo "version=$version" >> $GITHUB_OUTPUT

        - name: Cache Playwright binaries
          uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830   # v4
          id: playwright-cache
          with:
              path: ~/.cache/ms-playwright
              key: playwright-${{ steps.playwright.outputs.version }}-${{ runner.os }}

        - name: Install Playwright browser(s)
          if: steps.playwright-cache.outputs.cache-hit != 'true'
          shell: bash
          run: npx playwright@${{ steps.playwright.outputs.version }} install --with-deps
